<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Review</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI';
    background: #0a0f1c;
    color: white;
}

/* NAVBAR */
nav {
    display: flex;
    justify-content: space-between;
    padding: 20px 60px;
    background: rgba(0,0,0,0.7);
}

nav h2 {
    color: #00e5ff;
}

nav a {
    color: white;
    margin: 15px;
    text-decoration: none;
}

/* HERO */
.hero {
    text-align: center;
    padding: 40px;
}

.hero img {
    width: 60%;
    border-radius: 10px;
}

/* SECTION */
.section {
    padding: 40px;
    text-align: center;
}

/* FORM */
.form-box {
    background: rgba(255,255,255,0.05);
    padding: 25px;
    border-radius: 10px;
    width: 70%;
    margin: auto;
}

input, textarea, select {
    width: 80%;
    padding: 10px;
    margin: 10px;
    border-radius: 5px;
    border: none;
}

button {
    background: orange;
    padding: 10px 20px;
    border: none;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

/* REVIEW GRID */
.review-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    margin-top: 30px;
}

/* CARD BOX */
.review-card {
    width: 300px;
    background: rgba(0,0,0,0.6);
    padding: 20px;
    border-radius: 10px;
}

/* STAR BELOW BOX */
.rating {
    margin-top: 10px;
    color: gold;
    font-size: 20px;
}

/* CREATORS */
.creators {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin-top: 30px;
}

.creator-box img {
    width: 140px;
    height: 140px;
    border-radius: 50%;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    background: #0d1324;
    margin-top: 30px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
    <h2>Fractal Dimension</h2>
    <div>
        <a href="/">Home</a>
        <a href="/process">Analyzer</a>
        <a href="/review">Review</a>
    </div>
</nav>

<!-- HERO -->
<section class="hero">
    <img src="{{ url_for('static', filename='imagesmandel.jpeg') }}">
</section>

<!-- FORM -->
<div class="section">
    <h1>Submit Review</h1>

    <div class="form-box">
        <input type="text" id="name" placeholder="Name">
        <input type="text" id="structure" placeholder="Structure Name">
        <input type="text" id="usage" placeholder="Usage">
        <input type="text" id="dimension" placeholder="Dimension Value">
        <textarea id="feedback" placeholder="Feedback"></textarea>

        <select id="rating">
            <option value="">Rating</option>
            <option value="1">⭐</option>
            <option value="2">⭐⭐</option>
            <option value="3">⭐⭐⭐</option>
            <option value="4">⭐⭐⭐⭐</option>
            <option value="5">⭐⭐⭐⭐⭐</option>
        </select>

        <br>
        <button onclick="addReview()">Submit</button>
    </div>

    <!-- REVIEW DISPLAY -->
    <div class="review-container" id="reviews"></div>
</div>

<!-- CREATORS -->
<div class="section">
    <h1>Creators</h1>

    <div class="creators">
        <div class="creator-box">
            <img src="{{ url_for('static', filename='sakthi.jpeg') }}">
            <h3>Sakthisri M</h3>
        </div>

        <div class="creator-box">
            <img src="{{ url_for('static', filename='vrinaalini.jpeg') }}">
            <h3>Vrinaalini M.S</h3>
        </div>

        <div class="creator-box">
            <img src="{{ url_for('static', filename='harishh.jpeg') }}">
            <h3>R. Harish</h3>
        </div>
    </div>
</div>

<!-- FOOTER -->
<footer>
    <p>© 2026 Fractal Dimension Project</p>
</footer>

<script>
function addReview() {

    let name = document.getElementById("name").value;
    let structure = document.getElementById("structure").value;
    let usage = document.getElementById("usage").value;
    let dimension = document.getElementById("dimension").value;
    let feedback = document.getElementById("feedback").value;
    let rating = document.getElementById("rating").value;

    if(name=="" || structure=="" || usage=="" || dimension=="" || feedback=="" || rating==""){
        alert("Fill all fields");
        return;
    }

    let stars = "⭐".repeat(rating);

    let card = document.createElement("div");
    card.className = "review-card";

    card.innerHTML = `
        <b>Name:</b> ${name}<br>
        <b>Structure:</b> ${structure}<br>
        <b>Usage:</b> ${usage}<br>
        <b>Dimension:</b> ${dimension}<br>
        <b>Feedback:</b> ${feedback}
        <div class="rating">${stars}</div>
    `;

    document.getElementById("reviews").appendChild(card);

    // clear
    document.getElementById("name").value="";
    document.getElementById("structure").value="";
    document.getElementById("usage").value="";
    document.getElementById("dimension").value="";
    document.getElementById("feedback").value="";
    document.getElementById("rating").value="";
}
</script>

</body>
</html>
